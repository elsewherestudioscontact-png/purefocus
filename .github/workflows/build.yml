name: Build PureFocus APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Flutter precache
        run: flutter precache --android

      - name: Generate fresh Android folder via flutter create
        run: |
          flutter create --org com.elsewhere --project-name purefocus /tmp/fresh
          rm -rf android
          cp -r /tmp/fresh/android .
          sed -i 's/com.elsewhere.purefocus/com.elsewhere.purefocus/g' android/app/build.gradle

      - name: Generate local.properties
        run: |
          FLUTTER_SDK=$(which flutter | sed 's|/bin/flutter||')
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: purefocus-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
